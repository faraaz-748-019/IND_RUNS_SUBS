# =============================================================================
# AI Candidate Ranking Engine — Master Configuration
# =============================================================================
# All weights, thresholds, and model choices are configurable here.
# No code changes needed to tune the pipeline.

# --- Paths ---
paths:
  candidates: "[PUB] India_runs_data_and_ai_challenge/[PUB] India_runs_data_and_ai_challenge/India_runs_data_and_ai_challenge/candidates.jsonl"
  sample_candidates: "data/sample_candidates.json"
  job_description: "data/job_description.txt"
  eval_set: "data/eval_set.json"
  embedding_cache: "data/cache/embeddings.npy"
  faiss_index: "data/cache/faiss.index"
  candidate_ids_cache: "data/cache/candidate_ids.json"
  output_csv: "output/submission.csv"
  output_detailed: "output/submission_detailed.json"

# --- Models (free, CPU-friendly, open-source) ---
models:
  embedding: "all-MiniLM-L6-v2"
  cross_encoder: "cross-encoder/ms-marco-MiniLM-L-6-v2"

# --- Retrieval ---
retrieval:
  bm25_top_k: 1000
  dense_top_k: 1000
  hybrid_top_k: 500
  rerank_top_k: 300
  rrf_k: 60
  final_top_k: 100

# --- Score Weights (must sum to 1.0) ---
weights:
  semantic: 0.30
  attribute: 0.45
  behavioral: 0.25

# --- Attribute Scoring Weights (within attribute category) ---
attribute_weights:
  skills_match: 0.25
  experience_fit: 0.20
  title_relevance: 0.20
  domain_fit: 0.15
  career_trajectory: 0.10
  location_fit: 0.05
  education_fit: 0.05

# --- Behavioral Scoring Weights (within behavioral category) ---
behavioral_weights:
  recency: 0.25
  responsiveness: 0.20
  engagement: 0.15
  availability: 0.15
  assessment: 0.10
  social_proof: 0.10
  verification: 0.05

# --- Behavioral Signal Decay ---
decay:
  half_life_days: 90
  reference_date: "2026-06-15"

# --- Diversity (MMR) ---
mmr:
  enabled: true
  lambda: 0.8
  top_k: 100

# --- Honeypot Detection Thresholds ---
honeypot:
  max_expert_skills_zero_duration: 2
  max_experience_gap_years: 3
  min_career_entries: 0

