ai_usage_summary: |
  Used Claude for architecture discussion, code review, and accelerating
  implementation. All engineering decisions were human-driven. No candidate
  data was fed to any LLM during ranking.

methodology_summary: |
  Hybrid retrieval engine combining BM25 sparse keyword matching with dense
  sentence-transformer embeddings (all-MiniLM-L6-v2), fused via Reciprocal
  Rank Fusion. Top candidates re-ranked with a cross-encoder
  (ms-marco-MiniLM-L-6-v2) for precision. Three scoring pillars: semantic
  similarity (0.30), structured attribute match with anti-pattern detection
  (0.45), and behavioral signals with recency decay (0.25). Honeypot
  detection via 10 profile-impossibility heuristics. MMR diversity
  re-ranking prevents near-duplicate shortlists. Per-candidate rationale
  generated from specific profile data. All free, CPU-only models.

declarations:
